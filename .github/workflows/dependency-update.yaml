name: Monthly Dependencies Update

on:
  schedule:
    - cron: "0 9 1 * *" # First day of each month at 9:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - name: Update pnpm
        run: pnpm self-update

      - name: Update pnpm dependencies
        run: pnpm update --latest

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Update GitHub Actions dependencies
        run: uvx gha-update

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch --force-create dependencies-update
          git add .
          git diff --cached --quiet || git commit --message "Update dependencies to latest"
          git push --force origin dependencies-update

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          existing_pr=$(gh pr list --head dependencies-update --base main --state open --json number --jq '.[0].number')
          if [ -z "$existing_pr" ]; then
            gh pr create --fill --label dependencies --base main
          fi
